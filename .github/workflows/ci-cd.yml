name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ""
        run: ./mvnw -B clean verify

      - name: Build Docker image
        run: docker build -t finance-api:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        id: secret_check
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          if [ -n "$HEROKU_API_KEY" ] && [ -n "$HEROKU_APP_NAME" ]; then
            echo "do_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "do_deploy=false" >> "$GITHUB_OUTPUT"
            echo "HEROKU_API_KEY or HEROKU_APP_NAME is missing; deploy steps will be skipped."
          fi

      - name: Install Heroku CLI
        if: steps.secret_check.outputs.do_deploy == 'true'
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Validate Heroku app exists
        if: steps.secret_check.outputs.do_deploy == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          CI: true
        run: |
          if ! heroku apps:info --app "$HEROKU_APP_NAME" > /dev/null 2>&1; then
            echo "Heroku app '$HEROKU_APP_NAME' not found or access denied."
            exit 1
          fi

      - name: Configure datasource from Heroku DATABASE_URL
        if: steps.secret_check.outputs.do_deploy == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          CI: true
        run: |
          DATABASE_URL=$(heroku config:get DATABASE_URL --app "$HEROKU_APP_NAME" || true)
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set on Heroku app '$HEROKU_APP_NAME'."
            echo "Attach Heroku Postgres addon first, then rerun workflow."
            exit 1
          fi

          JDBC_URL=$(DATABASE_URL="$DATABASE_URL" python3 -c "import os, urllib.parse as u; p=u.urlparse(os.environ['DATABASE_URL']); q=u.urlencode({'sslmode':'require','user':p.username or '','password':p.password or ''}); print('jdbc:postgresql://%s:%s/%s?%s' % (p.hostname, p.port or 5432, p.path.lstrip('/'), q))")

          heroku config:set SPRING_DATASOURCE_URL="$JDBC_URL" --app "$HEROKU_APP_NAME"

      - name: Deploy Docker image to Heroku
        if: steps.secret_check.outputs.do_deploy == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          CI: true
        run: |
          heroku stack:set container --app "$HEROKU_APP_NAME"
          echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com
          docker build -t "registry.heroku.com/$HEROKU_APP_NAME/web" .
          docker push "registry.heroku.com/$HEROKU_APP_NAME/web"
          heroku container:release web --app "$HEROKU_APP_NAME"

      - name: Health check
        if: steps.secret_check.outputs.do_deploy == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          CI: true
        run: |
          APP_URL=$(heroku apps:info --app "$HEROKU_APP_NAME" --json | python3 -c 'import json,sys; print(json.load(sys.stdin)["app"]["web_url"].rstrip("/"))')
          HEALTH_URL="$APP_URL/actuator/health"
          echo "Using healthcheck URL: $HEALTH_URL"

          for i in {1..36}; do
            RESPONSE=$(curl -sS -L --max-time 15 -w "\nHTTP_CODE:%{http_code}" "$HEALTH_URL" || true)
            BODY=$(echo "$RESPONSE" | sed '$d')
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1 | sed 's/HTTP_CODE://')

            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"'; then
              echo "Healthcheck passed"
              exit 0
            fi

            echo "Waiting for service to become healthy... attempt $i/36 (HTTP $HTTP_CODE)"
            echo "Response body: $BODY"
            sleep 10
          done

          echo "Healthcheck failed"
          exit 1

      - name: Dump Heroku logs on failure
        if: failure() && steps.secret_check.outputs.do_deploy == 'true'
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
          CI: true
        run: heroku logs --tail --num 200 --app "$HEROKU_APP_NAME"

      - name: Deploy skipped
        if: steps.secret_check.outputs.do_deploy != 'true'
        run: echo "Deploy skipped because required secrets are not configured."
