name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ""
        run: ./mvnw -B clean verify

      - name: Build Docker image
        run: docker build -t finance-api:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.HEROKU_API_KEY != '' && secrets.HEROKU_APP_NAME != '' && secrets.APP_HEALTHCHECK_URL != ''
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy Docker image to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          if [ -z "$HEROKU_API_KEY" ]; then
            echo "HEROKU_API_KEY is not set"
            exit 1
          fi

          if [ -z "$HEROKU_APP_NAME" ]; then
            echo "HEROKU_APP_NAME is not set"
            exit 1
          fi

          heroku stack:set container --app "$HEROKU_APP_NAME"
          echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com
          docker build -t "registry.heroku.com/$HEROKU_APP_NAME/web" .
          docker push "registry.heroku.com/$HEROKU_APP_NAME/web"
          heroku container:release web --app "$HEROKU_APP_NAME"

      - name: Health check
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          if [ -z "$APP_HEALTHCHECK_URL" ]; then
            echo "APP_HEALTHCHECK_URL is not set"
            exit 1
          fi

          for i in {1..30}; do
            STATUS=$(curl -sS "$APP_HEALTHCHECK_URL" | grep -o '"status":"[A-Z]*"' || true)
            if [ "$STATUS" = '"status":"UP"' ]; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Waiting for service to become healthy... attempt $i/30"
            sleep 10
          done

          echo "Healthcheck failed"
          exit 1