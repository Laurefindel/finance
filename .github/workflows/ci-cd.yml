name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ""
        run: ./mvnw -B clean verify

      - name: Build Docker image
        run: docker build -t finance-api:${{ github.sha }} .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@e3eb99d45a8e2ec5dca08735e089607befa4bf28
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true

      - name: Health check
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          if [ -z "$APP_HEALTHCHECK_URL" ]; then
            echo "APP_HEALTHCHECK_URL is not set"
            exit 1
          fi

          for i in {1..30}; do
            STATUS=$(curl -sS "$APP_HEALTHCHECK_URL" | grep -o '"status":"[A-Z]*"' || true)
            if [ "$STATUS" = '"status":"UP"' ]; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Waiting for service to become healthy... attempt $i/30"
            sleep 10
          done

          echo "Healthcheck failed"
          exit 1